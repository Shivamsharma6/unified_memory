name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r memory_watcher/requirements.txt
          pip install -e uams_sdk

      - name: Compile Python files
        run: |
          python -m compileall memory_watcher uams_sdk

      - name: Run tests
        run: |
          python -m pytest memory_watcher/tests memory_watcher/api/tests -q

      - name: Check dependency metadata
        run: |
          python -m pip check
