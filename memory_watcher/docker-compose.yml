services:
  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:latest}
    ports:
      - "${QDRANT_HOST:-127.0.0.1}:${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_HOST:-127.0.0.1}:${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  qdrant_storage:
